<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>株式会社レンビス</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1c20 0%, #434343 100%);
      color: white;
    }
    .box {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      padding: 40px 30px;
      border-radius: 30px;
      width: 90%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }
    .logo-container {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
    }
    .logo {
      width: 90%;
      max-width: 280px;
      height: auto;
      mix-blend-mode: overlay; 
      filter: brightness(1.1) contrast(1.1);
      opacity: 0.9;
    }
    .address-info { font-size: 0.9rem; margin-bottom: 30px; }
    .address-info a { color: white; text-decoration: underline; }
    .btn {
      display: block;
      margin: 15px 0;
      padding: 15px;
      background: #ffffff;
      color: #000000;
      border-radius: 50px;
      font-weight: bold;
      text-decoration: none;
      font-size: 1.1rem;
      transition: background 0.2s;
    }
    /* ホームページボタンだけ少し目立たせる色（お好みで） */
    .btn-web { background: #f0f0f0; border: 2px solid #ffffff; }
    .btn:active { background: #dddddd; }
    .tel { display: block; margin-top: 10px; font-size: 1.1rem; color: white; text-decoration: none; }
  </style>
</head>
<body>
<div class="box">
  <div class="logo-container">
    <img src="IMG_0188.jpeg" alt="RENVISロゴ" class="logo">
  </div>
  <div class="address-info">
    <p>〒838-0224</p>
    <p><a href="https://maps.google.com/maps/place//data=!4m2!3m1!1s0x35419f496fa7d31f:0x829078d1ff81ecb5?entry=s&sa=X&ved=2ahUKEwiEsern1fGTAxU8r1YBHctpDl4Q4kB6BAgTEAA&hl=ja" target="_blank">福岡県朝倉郡筑前町松延807-3</a></p>
    <a href="tel:0946428311" class="tel">TEL：0946-42-8311</a>
  </div>
  
  <a class="btn btn-web" href="https://renvis.co.jp" target="_blank">Official Website</a>
  
  <a class="btn" href="https://lite.tiktok.com/t/ZS9LHA3Lyxka9-sK39x/" target="_blank">TikTok</a>
  <a class="btn" href="https://www.instagram.com/renvisrenvis?igsh=MWtyN2lxMzdtdDQyaA==" target="_blank">Instagram</a>
</div>
</body>
</html>
