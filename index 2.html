<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>株式会社レンビス</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1c20 0%, #434343 100%);
      color: white;
    }
    .box {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      padding: 40px 30px;
      border-radius: 30px;
      width: 90%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }
    .logo {
      width: 100%;
      max-width: 220px;
      margin-bottom: 30px;
      mix-blend-mode: screen; 
      filter: brightness(1.2);
    }
    .address-info { font-size: 0.9rem; margin-bottom: 30px; }
    .address-info a { color: white; }
    .btn {
      display: block;
      margin: 15px 0;
      padding: 15px;
      background: #ffffff;
      color: #000000;
      border-radius: 50px;
      font-weight: bold;
      text-decoration: none;
      transition: 0.2s;
    }
    .tel { display: block; margin-top: 10px; color: white; text-decoration: none; }
  </style>
</head>
<body>
